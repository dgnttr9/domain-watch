services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: domain
      POSTGRES_PASSWORD: domain
      POSTGRES_DB: domainwatch
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U domain -d domainwatch"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://domain:domain@postgres:5432/domainwatch}
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8000}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

  worker:
    build:
      context: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://domain:domain@postgres:5432/domainwatch}
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8000}
    command: ["sh", "-c", "python -m alembic upgrade head && python -c \"from app.scheduler.background_worker import run_scheduler_loop; run_scheduler_loop()\""]
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
    depends_on:
      - backend
    ports:
      - "4173:80"

volumes:
  pgdata:
